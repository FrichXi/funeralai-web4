# Pipeline configuration for 葬AI Knowledge Graph
# Fork users: edit this file instead of modifying Python source code.

[pipeline]
model = "gemini-3.1-pro-preview"
prompt_version = "2026-03-15-vc-firm-relationship-v7"
extractor_version = "2026-03-15-overrides-pipeline-v5"
graph_schema_version = "2026-03-15-vc-firm-v3"

[extraction]
max_workers = 4
max_retries = 6
batch_size = 6
cooldown_seconds = 8
max_rounds = 30

[article_source]
name = "funeralai-substack"
base_url = "https://funeralai.substack.com/"
feed_url = "https://funeralai.substack.com/feed"
archive_api_url = "https://funeralai.substack.com/api/v1/archive?sort=new&search=&offset=0&limit=20"

[kg_review]
last_holistic_review_article = "111"
max_unreviewed_articles = 12
recent_window_articles = 24
candidate_pair_min_mentions = 3
max_candidate_pairs_print = 20
max_isolated_entities_print = 20
